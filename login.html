<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="favicon-C.ico" />
  <title>Log in - Clook</title>

  <script>
    (function () {
      var saved = localStorage.getItem("clook-theme");
      document.documentElement.setAttribute("data-theme", saved === "dark" ? "dark" : "light");
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar-left">
      <a href="index.html" style="text-decoration:none;">
        <span class="logo"><span class="logo-accent">C</span>look</span>
      </a>
    </div>
    <div class="navbar-actions">
      <button type="button" id="theme-toggle" class="btn btn-ghost theme-toggle-btn">Dark</button>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card">
      <p class="auth-subtitle">Welcome back</p>

      <div class="auth-error" id="error-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Log in</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script type="module" src="theme.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
